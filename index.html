<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grace Sambali — Facility Asset Management, Gracing Ventures</title>
<meta name="description" content="Facility Asset Management for commercial and critical facilities in Tanzania — asset registers, preventive maintenance, and compliance, built by a registered Electrical Engineer (PEng-T).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-deep: #0F1B2E;
    --navy: #1A3566;
    --navy-light: #2A4A6B;
    --brass: #C8963E;
    --brass-light: #E0B968;
    --vellum: #F5F3EC;
    --vellum-line: #E4E0D3;
    --ink: #1C2333;
    --muted: #6B7280;
    --grid-line: rgba(255,255,255,0.06);
    --alert: #B0431E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    background: var(--vellum);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: -0.01em; }

  .mono { font-family: 'IBM Plex Mono', monospace; }

  a { color: inherit; text-decoration: none; }

  ::selection { background: var(--brass); color: var(--navy-deep); }

  :focus-visible { outline: 2px solid var(--brass); outline-offset: 3px; }

  .reg-marks { position: relative; }
  .reg-marks::before, .reg-marks::after,
  .reg-marks .rm-tr, .reg-marks .rm-br {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    pointer-events: none;
  }
  .reg-marks::before { top: 0; left: 0; border-top: 1.5px solid currentColor; border-left: 1.5px solid currentColor; opacity: 0.4; }
  .reg-marks::after { bottom: 0; left: 0; border-bottom: 1.5px solid currentColor; border-left: 1.5px solid currentColor; opacity: 0.4; }
  .reg-marks .rm-tr { top: 0; right: 0; border-top: 1.5px solid currentColor; border-right: 1.5px solid currentColor; opacity: 0.4; }
  .reg-marks .rm-br { bottom: 0; right: 0; border-bottom: 1.5px solid currentColor; border-right: 1.5px solid currentColor; opacity: 0.4; }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 5vw;
    background: rgba(15,27,46,0.88);
    backdrop-filter: blur(10px);
    transition: padding 0.3s ease;
  }
  .nav-name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--vellum);
    letter-spacing: 0.02em;
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,243,236,0.65);
    transition: color 0.2s ease;
  }
  .nav-links a:hover { color: var(--brass-light); }

  @media (max-width: 720px) {
    .nav-links { display: none; }
  }

  .hero {
    min-height: 100vh;
    background: var(--navy-deep);
    color: var(--vellum);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px 5vw 0;
    overflow: hidden;
  }
  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0;
    animation: gridFadeIn 1.8s ease forwards 0.2s;
  }
  @keyframes gridFadeIn { to { opacity: 1; } }

  .hero-flex {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 64px;
    max-width: 1300px;
  }
  .hero-text { flex: 1.15; min-width: 0; }
  .hero-photo-wrap {
    flex: 0.85;
    flex-shrink: 0;
    position: relative;
    max-width: 380px;
    width: 100%;
    opacity: 0;
    animation: riseIn 1s ease forwards 0.5s;
  }
  .hero-photo-frame {
    position: relative;
    border: 1px solid rgba(200,150,62,0.35);
    padding: 14px;
  }
  .hero-photo-frame img {
    width: 100%;
    height: auto;
    max-width: 100%;
    display: block;
    filter: grayscale(0.08) contrast(1.03);
  }
  .hero-photo-tag {
    position: absolute;
    bottom: -1px;
    left: 14px;
    right: 14px;
    background: rgba(15,27,46,0.92);
    border-top: 1px solid rgba(200,150,62,0.35);
    padding: 10px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--brass-light);
    display: flex;
    justify-content: space-between;
  }

  @media (max-width: 980px) {
    .hero-flex { flex-direction: column-reverse; gap: 40px; }
    .hero-photo-wrap { max-width: 260px; width: 260px; flex: none; align-self: flex-start; }
  }

  .contact-rail {
    position: fixed;
    right: 28px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    opacity: 0;
    animation: railFadeIn 0.6s ease forwards 1.6s;
  }
  @keyframes railFadeIn { to { opacity: 1; } }
  .contact-rail a {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15,27,46,0.85);
    border: 1px solid rgba(200,150,62,0.3);
    color: var(--vellum);
    transition: all 0.25s ease;
    backdrop-filter: blur(6px);
  }
  .contact-rail a:hover { background: var(--brass); border-color: var(--brass); color: var(--navy-deep); transform: scale(1.08); }
  .contact-rail a.wa-primary { background: var(--brass); border-color: var(--brass); color: var(--navy-deep); }
  .contact-rail::after {
    content: '';
    width: 1px;
    height: 60px;
    background: linear-gradient(rgba(200,150,62,0.4), transparent);
  }
  .contact-rail svg { width: 17px; height: 17px; }

  @media (max-width: 720px) {
    .contact-rail { right: 14px; gap: 12px; }
    .contact-rail a { width: 34px; height: 34px; }
    .contact-rail::after { height: 34px; }
  }

  .hero-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brass-light);
    margin-bottom: 22px;
    opacity: 0;
    animation: riseIn 0.8s ease forwards 0.4s;
  }
  .hero h1 {
    font-size: clamp(2.4rem, 6.2vw, 4.6rem);
    line-height: 1.06;
    margin-bottom: 24px;
    opacity: 0;
    animation: riseIn 0.9s ease forwards 0.6s;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--brass-light);
  }
  .hero-sub {
    font-size: clamp(1rem, 2vw, 1.2rem);
    color: rgba(245,243,236,0.72);
    max-width: 580px;
    margin-bottom: 44px;
    opacity: 0;
    animation: riseIn 0.9s ease forwards 0.8s;
  }
  .hero-cta-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    opacity: 0;
    animation: riseIn 0.9s ease forwards 1s;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 2px;
    transition: all 0.25s ease;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--brass); color: var(--navy-deep); font-weight: 600; }
  .btn-primary:hover { background: var(--brass-light); transform: translateY(-1px); }
  .btn-outline { border-color: rgba(245,243,236,0.3); color: var(--vellum); }
  .btn-outline:hover { border-color: var(--brass-light); color: var(--brass-light); }
  .btn-outline-dark { border-color: rgba(28,35,51,0.25); color: var(--navy); }
  .btn-outline-dark:hover { border-color: var(--navy); }

  .scroll-cue {
    position: absolute;
    bottom: 36px;
    left: 5vw;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(245,243,236,0.4);
    z-index: 2;
  }
  .scroll-line { width: 32px; height: 1px; background: rgba(245,243,236,0.4); animation: scrollPulse 2s ease-in-out infinite; }
  @keyframes scrollPulse { 0%,100% { width: 32px; } 50% { width: 12px; } }

  .hero-coord {
    position: absolute;
    bottom: 36px;
    right: 5vw;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: rgba(245,243,236,0.4);
    z-index: 2;
    text-align: right;
  }

  section { padding: 110px 5vw; }
  .section-inner { max-width: 1180px; margin: 0 auto; }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--brass); }
  .section-title { font-size: clamp(1.8rem, 4vw, 2.6rem); color: var(--navy); margin-bottom: 20px; }

  .problem { background: var(--vellum); }
  .problem .section-title { max-width: 18ch; }
  .problem-intro { max-width: 62ch; color: var(--ink); font-size: 1.05rem; margin-bottom: 56px; }
  .problem-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--vellum-line);
    border: 1px solid var(--vellum-line);
  }
  .problem-card {
    background: var(--vellum);
    padding: 36px 32px;
  }
  .problem-card-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--alert);
    margin-bottom: 16px;
  }
  .problem-card h3 { font-size: 1.2rem; color: var(--navy); margin-bottom: 12px; }
  .problem-card p { color: var(--ink); font-size: 0.95rem; }

  @media (max-width: 800px) {
    .problem-grid { grid-template-columns: 1fr; }
  }

  .repeat-cta {
    margin-top: 56px;
    padding-top: 40px;
    border-top: 1px solid var(--vellum-line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
  }
  .repeat-cta.on-dark { border-top: 1px solid rgba(245,243,236,0.15); }
  .repeat-cta-note { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: 0.03em; color: var(--muted); max-width: 42ch; }
  .repeat-cta.on-dark .repeat-cta-note { color: rgba(245,243,236,0.55); }

  .about { background: var(--vellum); }
  .about-grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 64px;
    align-items: start;
  }
  .about-lede {
    font-size: clamp(1.1rem, 1.8vw, 1.35rem);
    color: var(--navy);
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 24px;
  }
  .about-body p { color: var(--ink); margin-bottom: 16px; max-width: 60ch; }
  .about-stats {
    border-top: 1px solid var(--vellum-line);
    padding-top: 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px 20px;
  }
  .stat-num { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 600; color: var(--navy); }
  .stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  .about-card {
    background: var(--navy-deep);
    color: var(--vellum);
    padding: 40px 34px;
    border-radius: 3px;
    position: relative;
  }
  .about-card .rm-tr, .about-card .rm-br { color: rgba(245,243,236,0.5); }
  .about-card::before, .about-card::after { color: rgba(245,243,236,0.5); }
  .about-card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--brass-light);
    margin-bottom: 18px;
  }
  .about-card-quote {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
    line-height: 1.5;
    margin-bottom: 24px;
  }
  .about-card-list { list-style: none; }
  .about-card-list li {
    font-size: 13.5px;
    padding: 10px 0;
    border-top: 1px solid rgba(245,243,236,0.12);
    display: flex;
    justify-content: space-between;
    color: rgba(245,243,236,0.85);
  }
  .about-card-list .tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--brass-light); }

  @media (max-width: 800px) {
    .about-grid { grid-template-columns: 1fr; }
  }

  .offer { background: var(--navy-deep); color: var(--vellum); }
  .offer .eyebrow { color: var(--brass-light); }
  .offer .eyebrow::before { background: var(--brass-light); }
  .offer .section-title { color: var(--vellum); }
  .offer-lede { color: rgba(245,243,236,0.68); max-width: 62ch; margin-bottom: 56px; font-size: 1.05rem; }

  .offer-core {
    border: 1px solid rgba(245,243,236,0.14);
    padding: 48px 44px;
    position: relative;
  }
  .offer-core-tag {
    position: absolute;
    top: 44px;
    right: 44px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--brass-light);
    border: 1px solid rgba(200,150,62,0.4);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .offer-core h3 { font-size: 1.7rem; margin-bottom: 14px; color: var(--vellum); max-width: 20ch; }
  .offer-core p.desc { color: rgba(245,243,236,0.68); margin-bottom: 34px; max-width: 52ch; }

  .offer-modules {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 32px 40px;
  }
  .offer-module-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--brass-light);
    margin-bottom: 10px;
    opacity: 0.9;
  }
  .offer-list { list-style: none; }
  .offer-list li {
    font-size: 13.5px;
    padding: 9px 0;
    border-top: 1px solid rgba(245,243,236,0.1);
    color: rgba(245,243,236,0.82);
    position: relative;
    padding-left: 18px;
  }
  .offer-list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--brass-light);
  }
  .offer-scale-note {
    grid-column: 1 / -1;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.03em;
    color: rgba(245,243,236,0.45);
    border-top: 1px solid rgba(245,243,236,0.1);
    padding-top: 18px;
  }

  @media (max-width: 800px) {
    .offer-modules { grid-template-columns: 1fr; }
    .offer-core { padding: 36px 26px; }
    .offer-core-tag { position: static; display: inline-block; margin-bottom: 20px; }
  }

  .offer-secondary {
    margin-top: 48px;
    padding-top: 40px;
    border-top: 1px solid rgba(245,243,236,0.12);
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }
  .offer-secondary-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,243,236,0.45);
    white-space: nowrap;
  }
  .offer-secondary p {
    color: rgba(245,243,236,0.55);
    font-size: 0.92rem;
    max-width: 62ch;
  }
  .offer-secondary a { color: var(--brass-light); border-bottom: 1px solid rgba(200,150,62,0.4); }

  .proof { background: var(--vellum); }
  .proof-case {
    margin-top: 50px;
    padding-bottom: 50px;
    border-bottom: 1px solid var(--vellum-line);
  }
  .proof-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .proof-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 4px 11px;
    border-radius: 20px;
    background: #E1EAF6;
    color: var(--navy);
  }
  .proof-title { font-size: 1.4rem; color: var(--navy); margin-bottom: 16px; }
  .proof-outcomes {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
  }
  .proof-outcome-num { font-family: 'Space Grotesk', sans-serif; font-size: 1.7rem; font-weight: 600; color: var(--navy); }
  .proof-outcome-label { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.04em; color: var(--muted); margin-top: 2px; }
  .proof-desc { color: var(--ink); max-width: 66ch; margin-bottom: 24px; }

  .dwg-carousel {
    margin-bottom: 16px;
    position: relative;
    border: 1px solid var(--vellum-line);
    background: var(--navy-deep);
  }
  .carousel-track-wrap { overflow: hidden; }
  .carousel-track {
    display: flex;
    transition: transform 0.45s cubic-bezier(0.65,0,0.35,1);
  }
  .carousel-slide { min-width: 100%; position: relative; }
  .carousel-slide img { width: 100%; display: block; }
  .carousel-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(15,27,46,0.9));
    color: var(--vellum);
    padding: 30px 18px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .carousel-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 34px; height: 34px;
    border-radius: 50%;
    background: rgba(15,27,46,0.7);
    border: 1px solid rgba(245,243,236,0.25);
    color: var(--vellum);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 3;
    transition: background 0.2s ease;
  }
  .carousel-nav:hover { background: var(--brass); border-color: var(--brass); color: var(--navy-deep); }
  .carousel-prev { left: 12px; }
  .carousel-next { right: 12px; }
  .carousel-dots { position: absolute; bottom: 10px; right: 14px; display: flex; gap: 6px; z-index: 3; }
  .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(245,243,236,0.35); cursor: pointer; transition: background 0.2s ease; }
  .carousel-dot.active { background: var(--brass-light); }

  .dwg-systems { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .dwg-systems span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 4px 9px;
    border: 1px solid var(--vellum-line);
    border-radius: 2px;
    color: var(--navy-light);
  }

  .proof-secondary {
    margin-top: 40px;
    display: grid;
    grid-template-columns: 90px 1fr auto;
    gap: 24px;
    align-items: start;
  }
  .proof-secondary-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--brass);
    letter-spacing: 0.04em;
    padding-top: 4px;
  }
  .proof-secondary-title { font-size: 1.05rem; color: var(--navy); margin-bottom: 6px; }
  .proof-secondary-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .proof-secondary-desc { color: var(--ink); max-width: 62ch; font-size: 0.95rem; }
  .proof-secondary-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    background: #E4EFE4;
    color: #2F6B2F;
    white-space: nowrap;
    height: fit-content;
  }

  @media (max-width: 640px) {
    .proof-outcomes { grid-template-columns: 1fr 1fr; }
    .proof-secondary { grid-template-columns: 1fr; gap: 8px; }
  }

  .contact {
    background: var(--navy-deep);
